<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Squid Game+</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="main">

        <div class="hero-bg"></div>


        <div class="bg-word-right">SQUID</div>

        <div class="char-wrap">
            <img src="leader.png" alt="Squid Game Character">
        </div>

        <nav>
            <div class="logo">
                <img src="logo.png" alt="Squid Game">
            </div>

            <ul class="nav-links">
                <li><a href="#">About</a></li>
                <li><a href="#" class="active">Watch now</a></li>
                <li><a href="#">Actors</a></li>
                <li><a href="#">Contact</a></li>
            </ul>

            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>

        <div class="hero-content">

            <div class="title-img">
                <img src="title.png" alt="">
            </div>

            <p class="hero-meta">
                Action / Thriller / Drama Series directed by Dong-hyuk Hwang<br>
                Season 1: 9 Episodes
            </p>

            <div class="btn-row">
                <button class="btn-play">
                    <div class="play-circle"><i class="fa-solid fa-play"></i></div>
                    Play Now
                </button>
                <button class="btn-trailer">
                    <i class="fa-solid fa-play"></i>
                    Watch Trailer
                </button>
            </div>
        </div>

        <div class="scroll-wrap">
            <span class="scroll-label">Scroll</span>
            <div class="scroll-line"></div>
        </div>

        <div class="social-bar">
            <a href="#"><i class="fa-brands fa-twitter"></i></a>
            <a href="#"><i class="fa-brands fa-instagram"></i></a>
            <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
        </div>

        <div class="thumb-strip">
            <div class="bg-word-bottom">GAME</div>
            <div class="thumb-arange">

                <div class="thumb">
                    <img src="thumb1.png" alt="Scene 1">
                </div>

                <div class="thumb">
                    <img src="thumb2.png" alt="Scene 2">
                </div>

                <div class="thumb">
                    <img src="thumb3.png" alt="Scene 3">
                </div>
            </div>
        </div>

    </div>

</body>

</html>
